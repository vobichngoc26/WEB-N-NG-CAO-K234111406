<div class="container mt-4">
  <div class="card" style="width: 18rem;">
    <div class="card-header">Login System</div>
    <div class="card-body">

      <form (ngSubmit)="login()">
        
        <div class="mb-3">
          <label class="form-label">User Name:</label>
          <input type="text"
                 class="form-control"
                 [(ngModel)]="username"
                 name="username">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password"
                 class="form-control"
                 [(ngModel)]="password"
                 name="password">
        </div>

        <button type="submit" class="btn btn-primary">
          Login
        </button>
        <div *ngIf="message" class="mt-3 alert alert-info">
  {{ message }}
</div>


      </form>

    </div>
  </div>
</div>
